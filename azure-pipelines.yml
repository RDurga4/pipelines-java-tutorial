# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main
- releases/*


  # adding strategy for learning deploying on multiple images
  # strategy can be added only once in a yaml, can be used to deploy in multiple platforms or in multiple versions of same platform.
  # vmImage: windows-latest
strategy:
  matrix:
    linux:
      imageName: "ubuntu-latest"
    mac:
      imageName: "macOS-latest"
    windows:
      imageName: "windows-latest"
  maxParallel: 3

# this is deploying in multiple platforms

# strategy:
#   matrix:
#     jdk10:
#       jdkVersion: "1.10"
#     jdk11:
#       jdkVersion: "1.11"
#   maxParallel: 2
#replace jdkVersionOption in task with jdkVersion

#this is deploying in multiple versions of same platform

# strategy:
#   matrix:
#     jdk10_linux:
#       imageName: "ubuntu-latest"
#       jdkVersion: "1.10"
#     jdk11_windows:
#       imageName: "windows-latest"
#       jdkVersion: "1.11"
#   maxParallel: 2
# replace corresponding variables

# this deploys the pipeline in multi platform, multi versions


pool:
  vmImage: $(imageName)

steps:
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    mavenOptions: '-Xmx3072m'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.11'
    jdkArchitectureOption: 'x64'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    goals: 'package'

- task: PublishCodeCoverageResults@2
  inputs:
    summaryFileLocation: "$(System.DefaultWorkingDirectory)/**/site/jacoco/jacoco.xml" # Path to summary files
    reportDirectory: "$(System.DefaultWorkingDirectory)/**/site/jacoco" # Path to report directory
    failIfCoverageEmpty: true # Fail if code coverage results are missing

